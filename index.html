<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please say yes! 🥺</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* A soft pastel gradient background */
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
            font-family: 'Fredoka', sans-serif; /* Using the cute font */
            overflow: hidden;
        }

        /* The white card holding the content */
        #container {
            text-align: center;
            background-color: white;
            padding: 40px 50px;
            border-radius: 30px; /* Highly rounded corners */
            box-shadow: 0 10px 25px rgba(255, 105, 135, 0.3); /* Soft pink shadow */
        }

        h1 {
            color: #ff6b81;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        /* Styling for both buttons */
        button {
            padding: 15px 35px;
            font-size: 22px;
            font-family: 'Fredoka', sans-serif;
            border: none;
            border-radius: 50px; /* Pill-shaped buttons */
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Bouncy effect when hovering */
        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* The cute YES button */
        #yes-btn {
            background-color: #ff9ff3;
            color: white;
        }

        #yes-btn:hover {
            background-color: #f368e0;
            box-shadow: 0 5px 15px rgba(243, 104, 224, 0.4);
        }

        /* The cute NO button */
        #no-btn {
            background-color: #c8d6e5;
            color: #576574;
            position: relative; 
        }

        /* The Celebration GIF */
        #celebration-gif {
            display: none; /* Hidden until YES is clicked */
            max-width: 250px;
            margin: 20px auto 0;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="container">
        <h1 id="question">Winchu kahi ghumne chale kya? Fir kinchu....... 🥺✨</h1>
        
        <div id="button-container">
            <button id="yes-btn">Yes! 💖</button>
            <button id="no-btn">No 🙈</button>
        </div>

        <img id="celebration-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdnpwam15NWwxMG8wZHVidThrYThmNTF0MHNjcWUzeGxuNnBzcDc2ZCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/KztT2c4u8mYYUiMKdJ/giphy.gif" alt="Cute Celebration!">
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const question = document.getElementById('question');
        const gif = document.getElementById('celebration-gif');
        const buttonContainer = document.getElementById('button-container');

        // --- Logic for the YES button ---
        yesBtn.addEventListener('click', () => {
            question.innerText = "Ave ave \n pata tha mujhe haa hi bologe! \n Kupunchu 🥰";
            buttonContainer.style.display = 'none'; // Hide the buttons
            gif.style.display = 'block'; // Show the GIF
        });

        // --- Logic for the NO button running away ---
        function dodge() {
            noBtn.style.position = 'absolute';

            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Listen for hovers and mobile taps
        noBtn.addEventListener('mouseover', dodge);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            dodge();
        });
    </script>

</body>
</html>
